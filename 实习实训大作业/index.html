<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>服务选择系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3B82F6',
                        secondary: '#10B981',
                        accent: '#8B5CF6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .card-shadow {
                box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            }
            .btn-hover {
                @apply transform transition-all duration-300 hover:scale-105 hover:shadow-lg;
            }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <header class="bg-gradient-to-r from-primary to-accent text-white shadow-lg">
        <div class="container mx-auto px-4 py-6">
            <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold flex items-center">
                <i class="fa fa-server mr-3"></i>服务选择系统
            </h1>
            <p class="text-lg mt-2 opacity-90">请选择您需要的服务并提交</p>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-8">
        <div class="max-w-3xl mx-auto">
            <div class="bg-white rounded-xl shadow-xl p-6 mb-8 transform transition-all duration-500 hover:shadow-2xl">
                <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fa fa-user-circle text-primary mr-2"></i>用户信息
                </h2>
                <div class="grid md:grid-cols-2 gap-4">
                    <div>
                        <label for="userId" class="block text-sm font-medium text-gray-700 mb-1">用户ID</label>
                        <input type="text" id="userId" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="请输入您的用户ID">
                    </div>
                    <div>
                        <label for="username" class="block text-sm font-medium text-gray-700 mb-1">用户名</label>
                        <input type="text" id="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-primary transition-all" placeholder="请输入您的用户名" disabled>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-xl p-6 mb-8 transform transition-all duration-500 hover:shadow-2xl">
                <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fa fa-check-square-o text-secondary mr-2"></i>服务选择
                </h2>
                <p class="text-gray-600 mb-4">请选择最多三项您需要的服务：</p>
                <div class="space-y-3">
                    <div class="flex items-center p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors">
                        <input type="checkbox" id="service1" value="云存储" class="form-checkbox h-5 w-5 text-primary rounded focus:ring-primary">
                        <label for="service1" class="ml-3 text-gray-700 flex items-center">
                            <i class="fa fa-cloud text-primary mr-2"></i>云存储服务
                        </label>
                    </div>
                    <div class="flex items-center p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors">
                        <input type="checkbox" id="service2" value="数据分析" class="form-checkbox h-5 w-5 text-primary rounded focus:ring-primary">
                        <label for="service2" class="ml-3 text-gray-700 flex items-center">
                            <i class="fa fa-bar-chart text-primary mr-2"></i>数据分析服务
                        </label>
                    </div>
                    <div class="flex items-center p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors">
                        <input type="checkbox" id="service3" value="人工智能" class="form-checkbox h-5 w-5 text-primary rounded focus:ring-primary">
                        <label for="service3" class="ml-3 text-gray-700 flex items-center">
                            <i class="fa fa-robot text-primary mr-2"></i>人工智能服务
                        </label>
                    </div>
                    <div class="flex items-center p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors">
                        <input type="checkbox" id="service4" value="网络安全" class="form-checkbox h-5 w-5 text-primary rounded focus:ring-primary">
                        <label for="service4" class="ml-3 text-gray-700 flex items-center">
                            <i class="fa fa-shield text-primary mr-2"></i>网络安全服务
                        </label>
                    </div>
                    <div class="flex items-center p-3 bg-gray-50 rounded-lg hover:bg-gray-100 transition-colors">
                        <input type="checkbox" id="service5" value="区块链" class="form-checkbox h-5 w-5 text-primary rounded focus:ring-primary">
                        <label for="service5" class="ml-3 text-gray-700 flex items-center">
                            <i class="fa fa-link text-primary mr-2"></i>区块链服务
                        </label>
                    </div>
                </div>
                <div id="selectionLimit" class="mt-3 text-red-500 text-sm hidden">
                    <i class="fa fa-exclamation-circle mr-1"></i>最多只能选择三项服务
                </div>
            </div>

            <div class="flex justify-center">
                <button id="submitBtn" class="bg-gradient-to-r from-primary to-accent text-white px-8 py-3 rounded-lg font-medium flex items-center btn-hover">
                    <i class="fa fa-paper-plane mr-2"></i>提交选择
                </button>
            </div>

            <div id="result" class="mt-8 bg-white rounded-xl shadow-xl p-6 transform transition-all duration-500 opacity-0 scale-95">
                <h2 class="text-2xl font-bold text-gray-800 mb-4 flex items-center">
                    <i class="fa fa-info-circle text-accent mr-2"></i>操作结果
                </h2>
                <div id="resultMessage" class="text-lg text-gray-700 mb-4">
                    <!-- 结果信息将在这里显示 -->
                </div>
                <div id="jsonResult" class="bg-gray-800 text-white p-4 rounded-lg font-mono text-sm overflow-x-auto hidden">
                    <!-- JSON数据将在这里显示 -->
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-gray-800 text-white py-6 mt-8">
        <div class="container mx-auto px-4 text-center">
            <p>© 2023 服务选择系统 - 版权所有</p>
            <p class="text-sm mt-2 opacity-70">用户勾选信息将被安全处理并存储</p>
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userIdInput = document.getElementById('userId');
            const usernameInput = document.getElementById('username');
            const checkboxes = document.querySelectorAll('input[type="checkbox"]');
            const selectionLimit = document.getElementById('selectionLimit');
            const submitBtn = document.getElementById('submitBtn');
            const resultDiv = document.getElementById('result');
            const resultMessage = document.getElementById('resultMessage');
            const jsonResult = document.getElementById('jsonResult');

            let selectedServices = [];

            // 限制最多选择3个服务
            checkboxes.forEach(checkbox => {
                checkbox.addEventListener('change', function() {
                    selectedServices = Array.from(checkboxes)
                        .filter(cb => cb.checked)
                        .map(cb => cb.value);

                    if (selectedServices.length > 3) {
                        this.checked = false;
                        selectedServices.pop();
                        selectionLimit.classList.remove('hidden');
                        setTimeout(() => {
                            selectionLimit.classList.add('hidden');
                        }, 3000);
                    }
                });
            });

            // 模拟用户ID与用户名的关联（实际应用中可能从服务器获取）
            userIdInput.addEventListener('input', function() {
                const userId = this.value.trim();
                if (userId) {
                    usernameInput.value = `用户_${userId}`;
                } else {
                    usernameInput.value = '';
                }
            });

            // 提交表单
            submitBtn.addEventListener('click', function() {
                const userId = userIdInput.value.trim();

                if (!userId) {
                    alert('请输入用户ID');
                    return;
                }

                if (selectedServices.length === 0) {
                    alert('请至少选择一项服务');
                    return;
                }

                // 构建JSON数据
                const data = {
                    "用户id": userId,
                    "服务1": selectedServices[0] || "",
                    "服务2": selectedServices[1] || "",
                    "服务3": selectedServices[2] || "",
                    "操作时间": new Date().toISOString()
                };

                // 显示结果
                resultDiv.classList.remove('opacity-0', 'scale-95');
                resultDiv.classList.add('opacity-100', 'scale-100');

                resultMessage.innerHTML = `
                    <div class="flex items-center text-green-600 mb-2">
                        <i class="fa fa-check-circle text-xl mr-2"></i>
                        <span>提交成功！</span>
                    </div>
                    <p>用户ID: <strong>${userId}</strong></p>
                    <p>已选择服务: <strong>${selectedServices.join('、')}</strong></p>
                `;

                jsonResult.textContent = JSON.stringify(data, null, 2);
                jsonResult.classList.remove('hidden');

                // 发送数据到服务器
                fetch('/submit', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                })
                .then(response => response.json())
                .then(serverResponse => {
                    console.log('服务器响应:', serverResponse);

                    // 更新结果信息
                    if (serverResponse.status === 'success') {
                        resultMessage.innerHTML += `
                            <div class="mt-3 flex items-center text-green-600">
                                <i class="fa fa-database mr-2"></i>
                                <span>数据库更新成功</span>
                            </div>
                        `;
                    } else {
                        resultMessage.innerHTML += `
                            <div class="mt-3 flex items-center text-red-500">
                                <i class="fa fa-exclamation-triangle mr-2"></i>
                                <span>数据库更新失败: ${serverResponse.message}</span>
                            </div>
                        `;
                    }
                })
                .catch(error => {
                    console.error('错误:', error);
                    resultMessage.innerHTML += `
                        <div class="mt-3 flex items-center text-red-500">
                            <i class="fa fa-exclamation-triangle mr-2"></i>
                            <span>网络错误: ${error.message}</span>
                        </div>
                    `;
                });
            });
        });
    </script>
</body>
</html>
