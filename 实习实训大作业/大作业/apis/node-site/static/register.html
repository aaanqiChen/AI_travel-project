<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>行知有途 - 注册</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">

  <!-- Tailwind配置 -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1A535C', // 深邃的海洋蓝作为主色调，体现旅行的广阔和深度
            secondary: '#4ECDC4', // 清新的绿松石色作为辅助色
            accent: '#FF6B6B', // 活力珊瑚色作为强调色
            light: '#F7FFF7', // 米白色背景
            dark: '#292F36', // 深色文本
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            display: ['Montserrat', 'sans-serif'],
          },
          animation: {
            'float': 'float 6s ease-in-out infinite',
            'drift': 'drift 15s linear infinite',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0) rotate(0deg)' },
              '50%': { transform: 'translateY(-20px) rotate(5deg)' },
            },
            drift: {
              '0%': { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' },
            }
          }
        },
      }
    }
  </script>

  <!-- 自定义工具类 -->
  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .text-shadow {
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
      }
      .bg-blur {
        backdrop-filter: blur(8px);
      }
      .card-shadow {
        box-shadow: 0 10px 30px -5px rgba(26, 83, 92, 0.1), 0 15px 35px -5px rgba(26, 83, 92, 0.2);
      }
      .paper-border {
        border: 1px dashed rgba(0, 0, 0, 0.1);
      }
      .text-gradient {
        background-clip: text;
        -webkit-background-clip: text;
        color: transparent;
      }
    }
  </style>

  <!-- 引入Google字体 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="bg-light min-h-screen font-sans text-dark overflow-x-hidden">
  <!-- 装饰元素：旅行路线背景 -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0 opacity-10">
    <svg viewBox="0 0 1000 600" class="absolute w-full h-full" xmlns="http://www.w3.org/2000/svg">
      <path d="M100,300 Q250,100 400,300 T700,300 T900,300" fill="none" stroke="#1A535C" stroke-width="2" stroke-dasharray="5,5" />
      <circle cx="100" cy="300" r="8" fill="#1A535C" />
      <circle cx="400" cy="300" r="8" fill="#1A535C" />
      <circle cx="700" cy="300" r="8" fill="#1A535C" />
      <circle cx="900" cy="300" r="8" fill="#1A535C" />
      <text x="100" y="280" text-anchor="middle" font-size="14" fill="#1A535C">起点</text>
      <text x="400" y="280" text-anchor="middle" font-size="14" fill="#1A535C">中途</text>
      <text x="700" y="280" text-anchor="middle" font-size="14" fill="#1A535C">探索</text>
      <text x="900" y="280" text-anchor="middle" font-size="14" fill="#1A535C">目的地</text>
    </svg>
  </div>

  <!-- 装饰元素：浮动旅行物品 -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0">
    <div class="absolute top-20 left-10 w-24 h-24 bg-primary/10 rounded-full animate-float" style="animation-delay: 0s;">
      <i class="fa fa-map-o absolute inset-0 flex items-center justify-center text-primary text-2xl"></i>
    </div>
    <div class="absolute top-40 right-20 w-32 h-32 bg-secondary/10 rounded-full animate-float" style="animation-delay: 1s;">
      <i class="fa fa-plane absolute inset-0 flex items-center justify-center text-secondary text-3xl"></i>
    </div>
    <div class="absolute bottom-32 left-1/4 w-28 h-28 bg-accent/10 rounded-full animate-float" style="animation-delay: 2s;">
      <i class="fa fa-camera absolute inset-0 flex items-center justify-center text-accent text-3xl"></i>
    </div>
    <div class="absolute bottom-40 right-1/3 w-20 h-20 bg-primary/10 rounded-full animate-float" style="animation-delay: 3s;">
      <i class="fa fa-suitcase absolute inset-0 flex items-center justify-center text-primary text-2xl"></i>
    </div>
  </div>

  <!-- 主容器 -->
  <div class="relative min-h-screen flex flex-col items-center justify-center p-4 z-10">
    <!-- 标题和标志 -->
    <div class="text-center mb-10 relative">
      <div class="inline-flex items-center justify-center w-28 h-28 bg-primary/10 rounded-full mb-6 shadow-lg border-2 border-primary/20 animate-pulse-slow">
        <i class="fa fa-paper-plane-o text-primary text-5xl transform -rotate-12"></i>
      </div>
      <h1 class="text-[clamp(2.5rem,6vw,4rem)] font-display font-bold bg-gradient-to-r from-primary to-secondary text-gradient">行知有途</h1>
      <p class="text-gray-600 mt-3 text-lg max-w-md mx-auto">探索世界，发现美好旅程</p>
    </div>

    <!-- 注册卡片 -->
    <div class="bg-white/90 bg-blur rounded-2xl p-8 md:p-10 max-w-md w-full card-shadow transition-all duration-500 hover:shadow-xl border border-gray-100">
      <div class="flex justify-center mb-8">
        <h2 class="text-2xl md:text-3xl font-display font-semibold text-dark relative">
          旅行者注册
          <div class="absolute -bottom-2 left-0 w-1/2 h-1 bg-primary rounded-full"></div>
        </h2>
      </div>

      <!-- 注册表单 -->
      <form id="registerForm" action="/register" method="post" class="space-y-6">
        <!-- 用户名输入 -->
        <div class="space-y-3">
          <label for="username" class="block text-sm font-medium text-gray-700">用户名</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
              <i class="fa fa-user-o text-lg"></i>
            </span>
            <input type="text" id="username" name="username" placeholder="请输入用户名"
                  class="w-full pl-12 pr-4 py-3.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200 text-dark placeholder-gray-400"
                  required>
          </div>
        </div>

        <!-- 邮箱输入 -->
        <div class="space-y-3">
          <label for="email" class="block text-sm font-medium text-gray-700">邮箱</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
              <i class="fa fa-envelope-o text-lg"></i>
            </span>
            <input type="email" id="email" name="email" placeholder="your@email.com"
                  class="w-full pl-12 pr-4 py-3.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200 text-dark placeholder-gray-400"
                  required>
          </div>
        </div>

        <!-- 密码输入 -->
        <div class="space-y-3">
          <label for="password" class="block text-sm font-medium text-gray-700">密码</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
              <i class="fa fa-lock text-lg"></i>
            </span>
            <input type="password" id="password" name="password" placeholder="••••••••"
                  class="w-full pl-12 pr-12 py-3.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200 text-dark placeholder-gray-400"
                  required>
            <button type="button" id="togglePassword" class="absolute inset-y-0 right-0 flex items-center pr-4 text-gray-500 hover:text-primary transition-colors">
              <i class="fa fa-eye-slash"></i>
            </button>
          </div>
        </div>

        <!-- 确认密码输入 -->
        <div class="space-y-3">
          <label for="confirmPassword" class="block text-sm font-medium text-gray-700">确认密码</label>
          <div class="relative">
            <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-gray-500">
              <i class="fa fa-lock text-lg"></i>
            </span>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="••••••••"
                  class="w-full pl-12 pr-12 py-3.5 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all duration-200 text-dark placeholder-gray-400"
                  required>
          </div>
        </div>

        <!-- 注册按钮 -->
        <button type="submit"
                class="w-full py-4 px-4 bg-gradient-to-r from-primary to-primary/80 text-white font-display font-medium rounded-xl shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-300 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:ring-offset-2 flex items-center justify-center">
          <i class="fa fa-user-plus mr-3 text-xl"></i> 注册账号
        </button>

        <!-- 分隔线 -->
        <div class="flex items-center my-6">
          <div class="flex-grow h-px bg-gray-200"></div>
          <span class="px-4 text-sm text-gray-500">或者</span>
          <div class="flex-grow h-px bg-gray-200"></div>
        </div>

        <!-- 社交登录 -->
        <div class="grid grid-cols-3 gap-4">
          <button type="button" class="flex items-center justify-center py-3.5 px-4 border border-gray-300 rounded-xl hover:bg-gray-50 transition-all duration-200 hover:shadow-md">
            <i class="fa fa-weixin text-[#07C160] text-2xl"></i>
          </button>
          <button type="button" class="flex items-center justify-center py-3.5 px-4 border border-gray-300 rounded-xl hover:bg-gray-50 transition-all duration-200 hover:shadow-md">
            <i class="fa fa-qq text-[#12B7F5] text-2xl"></i>
          </button>
          <button type="button" class="flex items-center justify-center py-3.5 px-4 border border-gray-300 rounded-xl hover:bg-gray-50 transition-all duration-200 hover:shadow-md">
            <i class="fa fa-weibo text-[#E6162D] text-2xl"></i>
          </button>
        </div>

        <!-- 登录链接 -->
        <div class="text-center text-sm text-gray-700 font-medium">
          已有账号？ <a href="/login" class="text-primary hover:text-primary/80 transition-colors border-b border-primary/30 hover:border-primary">立即登录</a>
        </div>
      </form>
    </div>

    <!-- 页脚 -->
    <div class="mt-12 text-center text-gray-500 text-sm">
      <p class="mb-2">© 2025 行知有途 - 让每一次旅行都有意义</p>
      <div class="flex justify-center space-x-4 mt-3">
        <a href="#" class="hover:text-primary transition-colors">隐私政策</a>
        <a href="#" class="hover:text-primary transition-colors">服务条款</a>
        <a href="#" class="hover:text-primary transition-colors">联系我们</a>
      </div>
    </div>
  </div>

  <!-- 交互脚本 -->
  <script>
    // 密码显示/隐藏切换
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);

      // 切换图标
      const icon = togglePassword.querySelector('i');
      if (type === 'text') {
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      } else {
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      }
    });

    // 表单提交处理
    const registerForm = document.getElementById('registerForm');
    registerForm.addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const confirmPassword = document.getElementById('confirmPassword').value;

      // 验证输入
      if (!username || !email || !password || !confirmPassword) {
        alert('请填写所有字段');
        return;
      }

      if (password !== confirmPassword) {
        alert('两次输入的密码不一致');
        return;
      }

      if (password.length < 6) {
        alert('密码长度至少6位');
        return;
      }

      // 显示加载状态
      const submitButton = this.querySelector('button[type="submit"]');
      const originalContent = submitButton.innerHTML;
      submitButton.disabled = true;
      submitButton.innerHTML = '<i class="fa fa-circle-o-notch fa-spin mr-3 text-xl"></i> 创建账号...';

      // 发送注册请求
      fetch('/register', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({
          username: username,
          email: email,
          password: password,
          confirmPassword: confirmPassword
        })
      })
      .then(response => response.json())
      .then(data => {
        if (data.success) {
          // 注册成功，跳转到登录页面
          alert('注册成功！请登录');
          window.location.href = '/login';
        } else {
          // 显示错误信息
          alert(data.error || '注册失败，请重试');
        }
      })
      .catch(error => {
        console.error('注册请求失败:', error);
        alert('注册失败，请检查网络连接');
      })
      .finally(() => {
        // 恢复按钮状态
        submitButton.disabled = false;
        submitButton.innerHTML = originalContent;
      });
    });

    // 添加页面加载动画
    document.addEventListener('DOMContentLoaded', function() {
      // 淡入效果
      document.body.classList.add('opacity-100');
      document.body.classList.remove('opacity-0');

      // 浮动元素动画延迟
      const floatingElements = document.querySelectorAll('.animate-float');
      floatingElements.forEach((el, index) => {
        el.style.animationDelay = `${index * 0.5}s`;
      });
    });


  </script>
</body>
</html>
